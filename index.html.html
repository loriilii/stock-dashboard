<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精油內觀練習</title>
    
    <!-- 預覽偽裝 -->
    <meta property="og:title" content="精油內觀練習 - 每日身心靈平衡指南">
    <meta property="og:description" content="透過精油與內觀呼吸，找回內心的平靜。本練習僅供內部學員使用。">
    <meta property="og:type" content="website">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 設定區 (請務必填寫) ---
        const SUPABASE_URL = '你的_PROJECT_URL';
        const SUPABASE_KEY = '你的_ANON_KEY';
        const CORRECT_PASSWORD = 'pizzahot666'; 
        const DISCOUNT = 0.28; 
        // -------------------------

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [inputPassword, setInputPassword] = useState('');
            const [stocks, setStocks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [formData, setFormData] = useState({ symbol: '', buyPrice: '', shares: '' });

            useEffect(() => {
                const authStatus = sessionStorage.getItem('isAuth');
                if (authStatus === 'true') setIsAuthenticated(true);
            }, []);

            // 抓取即時報價與股票名稱的優化函數
            const fetchStockData = async (symbol) => {
                try {
                    const cleanSymbol = symbol.trim();
                    const fullSymbol = cleanSymbol.length <= 4 ? `${cleanSymbol}.TW` : `${cleanSymbol}.TWO`;
                    
                    // 加上隨機參數防止快取
                    const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${fullSymbol}?interval=1m&range=1d&t=${Date.now()}`;
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                    
                    const res = await fetch(proxyUrl);
                    if (!res.ok) throw new Error("Proxy error");
                    
                    const data = await res.json();
                    const contents = JSON.parse(data.contents);
                    const result = contents.chart.result[0];
                    const meta = result.meta;
                    
                    // 嘗試從 Yahoo 抓取顯示名稱，若無則顯示代碼
                    // 在 Yahoo Chart API 中，shortName 或 symbol 通常在 meta 裡
                    return {
                        price: meta.regularMarketPrice,
                        name: meta.symbol === fullSymbol ? cleanSymbol : meta.symbol 
                    };
                } catch (e) { 
                    console.error("抓取失敗", symbol, e);
                    return { price: null, name: symbol }; 
                }
            };

            const refreshAllData = async () => {
                setIsRefreshing(true);
                const { data, error } = await supabaseClient.from('stocks').select('*').order('created_at', { ascending: true });
                if (!error && data) {
                    const updatedStocks = await Promise.all(data.map(async (s) => {
                        const info = await fetchStockData(s.symbol);
                        return { 
                            ...s, 
                            current_price: info.price || s.current_price, 
                            // 只有在資料庫名稱為空或代碼時，才更新為抓取到的名稱
                            name: (s.name && s.name !== s.symbol) ? s.name : info.name 
                        };
                    }));
                    setStocks(updatedStocks);
                }
                setLoading(false);
                setIsRefreshing(false);
            };

            useEffect(() => {
                if (isAuthenticated) refreshAllData();
            }, [isAuthenticated]);

            // 精確損益公式邏輯
            const calculateProfit = (stock) => {
                const B2 = parseFloat(stock.buy_price);
                const C2 = parseFloat(stock.shares);
                const D2 = parseFloat(stock.current_price);
                const E2 = DISCOUNT;
                if (!D2 || !B2 || !C2) return { totalProfit: 0, returnRate: 0 };

                const actualBuyCost = (B2 * C2) + Math.max(20, B2 * C2 * 0.001425 * E2);
                const expectedSellNet = (D2 * C2) - Math.max(20, D2 * C2 * 0.001425 * E2) - (D2 * C2 * 0.003);
                const totalProfit = Math.round(expectedSellNet - actualBuyCost);
                const returnRate = ((totalProfit / actualBuyCost) * 100).toFixed(2);
                
                return { totalProfit, returnRate };
            };

            const addStock = async (e) => {
                e.preventDefault();
                if (!formData.symbol || !formData.buyPrice) return;
                setIsRefreshing(true);
                const info = await fetchStockData(formData.symbol);
                const newStock = {
                    symbol: formData.symbol.trim(),
                    name: info.name,
                    buy_price: parseFloat(formData.buyPrice),
                    shares: parseInt(formData.shares) || 0,
                    current_price: info.price || 0
                };
                await supabaseClient.from('stocks').insert([newStock]);
                setFormData({ symbol: '', buyPrice: '', shares: '' });
                refreshAllData();
            };

            const deleteStock = async (id) => {
                if(!confirm("確定要刪除嗎？")) return;
                await supabaseClient.from('stocks').delete().eq('id', id);
                refreshAllData();
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-stone-100 p-4">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-xl w-full max-w-sm text-center">
                            <h2 className="text-xl font-bold text-stone-600 mb-2 tracking-widest">精油內觀練習</h2>
                            <p className="text-stone-400 text-[10px] mb-8 uppercase tracking-widest">Internal Verification Only</p>
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                if (inputPassword === CORRECT_PASSWORD) {
                                    setIsAuthenticated(true);
                                    sessionStorage.setItem('isAuth', 'true');
                                } else {
                                    alert('驗證碼錯誤');
                                    setInputPassword('');
                                }
                            }}>
                                <input type="password" placeholder="輸入認證碼" className="w-full p-4 bg-stone-50 rounded-2xl mb-4 border-none outline-none ring-1 ring-stone-200 focus:ring-2 focus:ring-stone-400 text-center font-bold" value={inputPassword} onChange={(e) => setInputPassword(e.target.value)} autoFocus />
                                <button className="w-full bg-stone-600 text-white p-4 rounded-2xl font-bold hover:bg-stone-700 transition-all active:scale-95 shadow-lg">進入練習</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h1 className="text-4xl font-black text-slate-800 tracking-tighter">勇往直錢</h1>
                            <p className="text-slate-400 text-sm font-medium mt-1">Real-time Trading Dashboard (國泰 2.8折)</p>
                        </div>
                        <button 
                            onClick={refreshAllData} 
                            disabled={isRefreshing}
                            className={`px-8 py-3 rounded-full font-bold shadow-xl transition-all active:scale-95 text-sm ${isRefreshing ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-blue-100'}`}
                        >
                            {isRefreshing ? '同步中...' : '🔄 立即同步數據'}
                        </button>
                    </header>

                    <form onSubmit={addStock} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 mb-8 grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input placeholder="股票代碼 (例: 2330)" className="bg-slate-50 p-4 rounded-2xl border-none outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500" value={formData.symbol} onChange={e => setFormData({...formData, symbol: e.target.value})} required />
                        <input type="number" step="0.01" placeholder="買入均價" className="bg-slate-50 p-4 rounded-2xl border-none outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500" value={formData.buyPrice} onChange={e => setFormData({...formData, buyPrice: e.target.value})} required />
                        <input type="number" placeholder="持有股數" className="bg-slate-50 p-4 rounded-2xl border-none outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500" value={formData.shares} onChange={e => setFormData({...formData, shares: e.target.value})} required />
                        <button type="submit" className="bg-slate-800 text-white rounded-2xl font-bold hover:bg-slate-900 transition-all active:scale-95 shadow-lg shadow-slate-200">加入監控</button>
                    </form>

                    <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50/50 border-b border-slate-50">
                                    <tr>
                                        <th className="p-6 text-slate-400 font-bold text-xs">代碼</th>
                                        <th className="p-6 text-slate-400 font-bold text-xs">名稱</th>
                                        <th className="p-6 text-blue-600 font-bold text-xs">即時價</th>
                                        <th className="p-6 text-slate-400 font-bold text-xs">成本均價</th>
                                        <th className="p-6 text-slate-400 font-bold text-xs">持有股數</th>
                                        <th className="p-6 text-slate-400 font-bold text-xs text-right">預估損益</th>
                                        <th className="p-6 text-slate-400 font-bold text-xs text-center">報酬率</th>
                                        <th className="p-6"></th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50">
                                    {loading ? (
                                        <tr><td colSpan="8" className="p-20 text-center text-slate-300 animate-pulse font-medium">資料庫同步中...</td></tr>
                                    ) : stocks.length === 0 ? (
                                        <tr><td colSpan="8" className="p-20 text-center text-slate-400">目前沒有監控項目。</td></tr>
                                    ) : stocks.map(stock => {
                                        const { totalProfit, returnRate } = calculateProfit(stock);
                                        const isProfit = totalProfit >= 0;
                                        return (
                                            <tr key={stock.id} className="hover:bg-slate-50/50 transition-colors group">
                                                <td className="p-6 font-bold text-slate-800">{stock.symbol}</td>
                                                <td className="p-6 text-slate-500 font-medium text-sm">{stock.name || '---'}</td>
                                                <td className="p-6 font-black text-2xl text-blue-600 tabular-nums">
                                                    {stock.current_price ? `${stock.current_price}` : <span className="text-slate-300 text-sm font-normal">讀取中</span>}
                                                </td>
                                                <td className="p-6 text-slate-500 font-medium">{stock.buy_price}</td>
                                                <td className="p-6 text-slate-500 font-medium">{stock.shares.toLocaleString()}</td>
                                                <td className={`p-6 font-black text-xl text-right tabular-nums ${isProfit ? 'text-red-500' : 'text-green-600'}`}>
                                                    {isProfit ? '+' : ''}{totalProfit.toLocaleString()}
                                                </td>
                                                <td className={`p-6 text-center`}>
                                                    <span className={`px-4 py-1.5 rounded-full font-bold text-sm ${isProfit ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-600'}`}>
                                                        {isProfit ? '+' : ''}{returnRate}%
                                                    </span>
                                                </td>
                                                <td className="p-6 text-center">
                                                    <button onClick={() => deleteStock(stock.id)} className="text-slate-200 hover:text-red-500 transition-colors p-2 opacity-0 group-hover:opacity-100">刪除</button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <footer className="mt-8 text-center text-[10px] text-slate-300 uppercase tracking-widest">
                        Data provided by Yahoo Finance Proxy • Precise Calculation Mode
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
