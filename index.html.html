<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票同步 Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 請在此填入你的 Supabase 資訊 ---
        const SUPABASE_URL = 'https://ygrolfbgjzvskkpeyidb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlncm9sZmJnanp2c2trcGV5aWRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTUzMjQsImV4cCI6MjA4ODY3MTMyNH0.odS73zRirsuqXs0tBzlK_OEDplFU0Q1W060M5u8lTRM';
        // ----------------------------------

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [stocks, setStocks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [formData, setFormData] = useState({ symbol: '', name: '', buyPrice: '', shares: '' });

            const FEE_RATE = 0.001425 * 0.28;
            const TAX_RATE = 0.003;
            const MIN_FEE = 20;

            // 從雲端抓取資料
            const fetchStocks = async () => {
                setLoading(true);
                const { data, error } = await supabase.from('stocks').select('*').order('created_at', { ascending: true });
                if (!error) setStocks(data);
                setLoading(false);
            };

            useEffect(() => { fetchStocks(); }, []);

            const calculateProfit = (stock) => {
                const buyAmount = stock.buy_price * stock.shares;
                const buyFee = Math.max(MIN_FEE, Math.floor(buyAmount * FEE_RATE));
                const totalCost = buyAmount + buyFee;
                const sellAmount = stock.current_price * stock.shares;
                const sellFee = Math.max(MIN_FEE, Math.floor(sellAmount * FEE_RATE));
                const sellTax = Math.floor(sellAmount * TAX_RATE);
                const totalProfit = Math.round(sellAmount - sellFee - sellTax - totalCost);
                const returnRate = ((totalProfit / totalCost) * 100).toFixed(2);
                return { totalProfit, returnRate };
            };

            const addStock = async (e) => {
                e.preventDefault();
                const newStock = {
                    symbol: formData.symbol,
                    name: formData.name,
                    buy_price: parseFloat(formData.buyPrice),
                    shares: parseInt(formData.shares),
                    current_price: parseFloat(formData.buyPrice)
                };
                const { error } = await supabase.from('stocks').insert([newStock]);
                if (!error) {
                    setFormData({ symbol: '', name: '', buyPrice: '', shares: '' });
                    fetchStocks();
                }
            };

            const updatePrice = async (id, newPrice) => {
                const { error } = await supabase.from('stocks').update({ current_price: parseFloat(newPrice) }).eq('id', id);
                if (!error) {
                    setStocks(stocks.map(s => s.id === id ? { ...s, current_price: newPrice } : s));
                }
            };

            const deleteStock = async (id) => {
                const { error } = await supabase.from('stocks').delete().eq('id', id);
                if (!error) fetchStocks();
            };

            return (
                <div className="max-w-6xl mx-auto">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-bold text-gray-800">股票同步 Dashboard (國泰 2.8折)</h1>
                        <button onClick={fetchStocks} className="text-sm bg-gray-200 px-3 py-1 rounded">整理資料</button>
                    </div>
                    
                    <form onSubmit={addStock} className="bg-white p-6 rounded-xl shadow-sm mb-8 grid grid-cols-2 md:grid-cols-5 gap-4">
                        <input placeholder="代號" className="border p-2 rounded" value={formData.symbol} onChange={e => setFormData({...formData, symbol: e.target.value})} />
                        <input placeholder="名稱" className="border p-2 rounded" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                        <input type="number" step="0.01" placeholder="買進價" className="border p-2 rounded" value={formData.buyPrice} onChange={e => setFormData({...formData, buyPrice: e.target.value})} />
                        <input type="number" placeholder="股數" className="border p-2 rounded" value={formData.shares} onChange={e => setFormData({...formData, shares: e.target.value})} />
                        <button type="submit" className="bg-blue-600 text-white rounded hover:bg-blue-700">新增持股</button>
                    </form>

                    <div className="bg-white rounded-xl shadow-sm overflow-hidden">
                        {loading ? <div className="p-10 text-center">載入中...</div> : (
                        <table className="w-full text-left">
                            <thead className="bg-gray-50 border-b">
                                <tr>
                                    <th className="p-4">代號 / 名稱</th>
                                    <th className="p-4 text-blue-600">即時價格 (手動同步)</th>
                                    <th className="p-4">買進均價</th>
                                    <th className="p-4">總獲利</th>
                                    <th className="p-4">報酬率</th>
                                    <th className="p-4">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {stocks.map(stock => {
                                    const { totalProfit, returnRate } = calculateProfit(stock);
                                    const isProfit = totalProfit >= 0;
                                    return (
                                        <tr key={stock.id} className="border-b hover:bg-gray-50">
                                            <td className="p-4">
                                                <div className="font-bold">{stock.symbol}</div>
                                                <div className="text-sm text-gray-500">{stock.name}</div>
                                            </td>
                                            <td className="p-4">
                                                <input 
                                                    type="number" step="0.01"
                                                    value={stock.current_price}
                                                    onChange={(e) => updatePrice(stock.id, e.target.value)}
                                                    className="w-24 border-b-2 border-blue-200 text-blue-600 font-bold bg-transparent outline-none"
                                                />
                                            </td>
                                            <td className="p-4">{stock.buy_price}</td>
                                            <td className={`p-4 font-bold ${isProfit ? 'text-red-500' : 'text-green-600'}`}>
                                                {isProfit ? '+' : ''}{totalProfit.toLocaleString()}
                                            </td>
                                            <td className={`p-4 font-bold ${isProfit ? 'text-red-500' : 'text-green-600'}`}>
                                                {isProfit ? '+' : ''}{returnRate}%
                                            </td>
                                            <td className="p-4">
                                                <button onClick={() => deleteStock(stock.id)} className="text-gray-300 hover:text-red-500">刪除</button>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
