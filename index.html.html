<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 網頁標題：瀏覽器分頁會顯示這個 -->
    <title>精油內觀練習</title>

    <!-- 網址預覽偽裝 (Open Graph Meta Tags) -->
    <meta property="og:title" content="精油內觀練習 - 每日身心靈平衡指南">
    <meta property="og:description" content="透過精油與內觀呼吸，找回內心的平靜。本練習僅供內部學員使用。">
    <meta property="og:type" content="website">
    <meta name="description" content="提供身心靈平衡的日常練習指南，結合精油香氛與冥想。">

    <!-- 引入 Library -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 設定區 ---
        const SUPABASE_URL = 'https://ygrolfbgjzvskkpeyidb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlncm9sZmJnanp2c2trcGV5aWRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTUzMjQsImV4cCI6MjA4ODY3MTMyNH0.odS73zRirsuqXs0tBzlK_OEDplFU0Q1W060M5u8lTRM';
        const CORRECT_PASSWORD = 'pizzahot666'; 
        const DISCOUNT = 0.28; 
        // --------------

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [inputPassword, setInputPassword] = useState('');
            const [stocks, setStocks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [formData, setFormData] = useState({ symbol: '', buyPrice: '', shares: '' });

            useEffect(() => {
                const authStatus = sessionStorage.getItem('isAuth');
                if (authStatus === 'true') setIsAuthenticated(true);
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                if (inputPassword === CORRECT_PASSWORD) {
                    setIsAuthenticated(true);
                    sessionStorage.setItem('isAuth', 'true');
                } else {
                    alert('驗證碼不正確，請重新確認。');
                    setInputPassword('');
                }
            };

            const fetchRealTimePrice = async (symbol) => {
                try {
                    const fullSymbol = symbol.length <= 4 ? `${symbol}.TW` : `${symbol}.TWO`;
                    const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${fullSymbol}`;
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                    const res = await fetch(proxyUrl);
                    const data = await res.json();
                    const contents = JSON.parse(data.contents);
                    const quote = contents.chart.result[0].meta;
                    return quote.regularMarketPrice;
                } catch (e) { return null; }
            };

            const refreshAllData = async () => {
                setIsRefreshing(true);
                const { data, error } = await supabaseClient.from('stocks').select('*').order('created_at', { ascending: true });
                if (!error && data) {
                    const updatedStocks = await Promise.all(data.map(async (s) => {
                        const price = await fetchRealTimePrice(s.symbol);
                        return { ...s, current_price: price || s.current_price };
                    }));
                    setStocks(updatedStocks);
                }
                setLoading(false);
                setIsRefreshing(false);
            };

            useEffect(() => {
                if (isAuthenticated) refreshAllData();
            }, [isAuthenticated]);

            const calculateProfit = (stock) => {
                const B2 = parseFloat(stock.buy_price);
                const C2 = parseFloat(stock.shares);
                const D2 = parseFloat(stock.current_price);
                const E2 = DISCOUNT;
                if (!D2 || !B2 || !C2) return { totalProfit: 0, returnRate: 0 };
                const actualBuyCost = (B2 * C2) + Math.max(20, B2 * C2 * 0.001425 * E2);
                const expectedSellNet = (D2 * C2) - Math.max(20, D2 * C2 * 0.001425 * E2) - (D2 * C2 * 0.003);
                const totalProfit = Math.round(expectedSellNet - actualBuyCost);
                const returnRate = ((totalProfit / actualBuyCost) * 100).toFixed(2);
                return { totalProfit, returnRate };
            };

            const addStock = async (e) => {
                e.preventDefault();
                if (!formData.symbol || !formData.buyPrice) return;
                const price = await fetchRealTimePrice(formData.symbol);
                const newStock = {
                    symbol: formData.symbol,
                    buy_price: parseFloat(formData.buyPrice),
                    shares: parseInt(formData.shares) || 0,
                    current_price: price || 0
                };
                await supabaseClient.from('stocks').insert([newStock]);
                setFormData({ symbol: '', buyPrice: '', shares: '' });
                refreshAllData();
            };

            const deleteStock = async (id) => {
                await supabaseClient.from('stocks').delete().eq('id', id);
                refreshAllData();
            };

            // 偽裝登入介面
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-stone-100 p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
                            <h2 className="text-xl font-bold text-stone-600 mb-2">精油內觀練習</h2>
                            <p className="text-stone-400 text-xs mb-6">Internal Access Only</p>
                            <form onSubmit={handleLogin}>
                                <input 
                                    type="password" 
                                    placeholder="請輸入認證碼" 
                                    className="w-full p-4 bg-stone-50 rounded-2xl mb-4 border-none outline-none ring-1 ring-stone-200 focus:ring-2 focus:ring-stone-400 text-center"
                                    value={inputPassword}
                                    onChange={(e) => setInputPassword(e.target.value)}
                                    autoFocus
                                />
                                <button className="w-full bg-stone-500 text-white p-4 rounded-2xl font-bold hover:bg-stone-600 transition shadow-lg">
                                    進入練習
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-3xl font-black text-slate-800 tracking-tight underline decoration-blue-500">實戰數據中心</h1>
                            <p className="text-slate-500 font-medium mt-1">國泰 2.8 折損益同步系統</p>
                        </div>
                        <button onClick={refreshAllData} className="bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-lg shadow-blue-100 transition hover:bg-blue-700">
                            {isRefreshing ? '讀取中...' : '同步數據'}
                        </button>
                    </div>

                    <form onSubmit={addStock} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-8 grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input placeholder="代號" className="bg-slate-50 p-3 rounded-xl border-none outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500" value={formData.symbol} onChange={e => setFormData({...formData, symbol: e.target.value})} required />
                        <input type="number" step="0.01" placeholder="買進價" className="bg-slate-50 p-3 rounded-xl border-none outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500" value={formData.buyPrice} onChange={e => setFormData({...formData, buyPrice: e.target.value})} required />
                        <input type="number" placeholder="股數" className="bg-slate-50 p-3 rounded-xl border-none outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500" value={formData.shares} onChange={e => setFormData({...formData, shares: e.target.value})} required />
                        <button type="submit" className="bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 shadow-lg transition">加入監控</button>
                    </form>

                    <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50/50 border-b border-slate-50">
                                    <tr>
                                        <th className="p-5 text-slate-400 font-bold text-xs">股票</th>
                                        <th className="p-5 text-blue-600 font-bold text-xs">即時</th>
                                        <th className="p-5 text-slate-400 font-bold text-xs">均價</th>
                                        <th className="p-5 text-slate-400 font-bold text-xs">股數</th>
                                        <th className="p-5 text-slate-400 font-bold text-xs">損益</th>
                                        <th className="p-5 text-slate-400 font-bold text-xs">報酬率</th>
                                        <th className="p-5"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {loading ? (
                                        <tr><td colSpan="7" className="p-10 text-center text-slate-300">連線中...</td></tr>
                                    ) : stocks.map(stock => {
                                        const { totalProfit, returnRate } = calculateProfit(stock);
                                        const isProfit = totalProfit >= 0;
                                        return (
                                            <tr key={stock.id} className="border-b border-slate-50 hover:bg-slate-50 transition">
                                                <td className="p-5 font-bold text-slate-700">{stock.symbol}</td>
                                                <td className="p-5 font-black text-xl text-blue-600">{stock.current_price ? `$${stock.current_price}` : '--'}</td>
                                                <td className="p-5 text-slate-500">{stock.buy_price}</td>
                                                <td className="p-5 text-slate-500">{stock.shares.toLocaleString()}</td>
                                                <td className={`p-5 font-black text-lg ${isProfit ? 'text-red-500' : 'text-green-600'}`}>
                                                    {isProfit ? '+' : ''}{totalProfit.toLocaleString()}
                                                </td>
                                                <td className={`p-5 font-bold ${isProfit ? 'text-red-500' : 'text-green-600'}`}>
                                                    <span className={`px-3 py-1 rounded-full ${isProfit ? 'bg-red-50' : 'bg-green-50'}`}>
                                                        {isProfit ? '+' : ''}{returnRate}%
                                                    </span>
                                                </td>
                                                <td className="p-5 text-center">
                                                    <button onClick={() => deleteStock(stock.id)} className="text-slate-200 hover:text-red-500 transition">刪除</button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
