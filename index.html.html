<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股即時監控 Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @keyframes pulse-blue { 0% { background-color: rgba(59, 130, 246, 0.1); } 50% { background-color: transparent; } 100% { background-color: rgba(59, 130, 246, 0.1); } }
        .refreshing { animation: pulse-blue 2s infinite; }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 請在此填入你的 Supabase 資訊 ---
        const SUPABASE_URL = 'https://ygrolfbgjzvskkpeyidb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlncm9sZmJnanp2c2trcGV5aWRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTUzMjQsImV4cCI6MjA4ODY3MTMyNH0.odS73zRirsuqXs0tBzlK_OEDplFU0Q1W060M5u8lTRM';
        // ----------------------------------

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [stocks, setStocks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [formData, setFormData] = useState({ symbol: '', buyPrice: '', shares: '' });

            const FEE_RATE = 0.001425 * 0.28;
            const TAX_RATE = 0.003;
            const MIN_FEE = 20;

            // 抓取台股即時報價 (透過 Yahoo Finance 代理)
            const fetchRealTimePrice = async (symbol) => {
                try {
                    // 台股需加上 .TW (上市) 或 .TWO (上櫃)，這裡簡單判斷：4碼通常是上市
                    const fullSymbol = symbol.length <= 4 ? `${symbol}.TW` : `${symbol}.TWO`;
                    const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${fullSymbol}`);
                    const json = await res.json();
                    const quote = json.chart.result[0].meta;
                    return {
                        price: quote.regularMarketPrice,
                        name: quote.symbol // Yahoo API 簡版名稱
                    };
                } catch (e) {
                    console.error("抓取股價失敗:", symbol);
                    return { price: 0, name: "未知" };
                }
            };

            // 從 Supabase 抓取資料並更新股價
            const refreshAllData = async () => {
                setIsRefreshing(true);
                const { data, error } = await supabaseClient.from('stocks').select('*').order('created_at', { ascending: true });
                
                if (!error && data) {
                    const updatedStocks = await Promise.all(data.map(async (s) => {
                        const info = await fetchRealTimePrice(s.symbol);
                        return { ...s, current_price: info.price, name: s.name || info.name };
                    }));
                    setStocks(updatedStocks);
                }
                setLoading(false);
                setIsRefreshing(false);
            };

            useEffect(() => { refreshAllData(); }, []);

            const calculateProfit = (stock) => {
                if (!stock.current_price) return { totalProfit: 0, returnRate: 0 };
                const buyAmount = stock.buy_price * stock.shares;
                const buyFee = Math.max(MIN_FEE, Math.floor(buyAmount * FEE_RATE));
                const totalCost = buyAmount + buyFee;
                const sellAmount = stock.current_price * stock.shares;
                const sellFee = Math.max(MIN_FEE, Math.floor(sellAmount * FEE_RATE));
                const sellTax = Math.floor(sellAmount * TAX_RATE);
                const totalProfit = Math.round(sellAmount - sellFee - sellTax - totalCost);
                const returnRate = ((totalProfit / totalCost) * 100).toFixed(2);
                return { totalProfit, returnRate };
            };

            const addStock = async (e) => {
                e.preventDefault();
                if (!formData.symbol) return;
                
                // 新增時先去抓一次名稱
                const info = await fetchRealTimePrice(formData.symbol);
                
                const newStock = {
                    symbol: formData.symbol,
                    name: formData.symbol, // 先用代號當名稱
                    buy_price: parseFloat(formData.buyPrice),
                    shares: parseInt(formData.shares),
                    current_price: info.price
                };
                
                const { error } = await supabaseClient.from('stocks').insert([newStock]);
                if (!error) {
                    setFormData({ symbol: '', buyPrice: '', shares: '' });
                    refreshAllData();
                }
